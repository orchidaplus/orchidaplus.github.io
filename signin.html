<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Orchid A+</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root{
    --bg:#00060F; --bg-soft:#050E1C; --panel:#081527;
    --line: rgba(120,170,220,0.16);
    --ink:#EAF1F8; --ink-dim:#8FA3B8;
    --blue:#0970C7; --blue-bright:#30C5FB;
    --danger:#FF6B6B; --success:#4FBE8D;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(ellipse at 15% 0%, rgba(9,112,199,0.16), transparent 45%),
      radial-gradient(ellipse at 85% 15%, rgba(48,197,251,0.10), transparent 40%),
      var(--bg);
    color:var(--ink); font-family:'IBM Plex Sans', sans-serif; line-height:1.55;
    min-height:100vh;
  }
  h1,h2{ font-family:'Poppins', sans-serif; font-weight:600; letter-spacing:-0.01em; }
  .mono{ font-family:'IBM Plex Mono', monospace; letter-spacing:0.02em; }
  a{ color:var(--blue-bright); text-decoration:none; }
  .wrap{ max-width:1120px; margin:0 auto; padding:0 28px; }

  nav{ position:sticky; top:0; z-index:50; background:rgba(0,6,15,0.82); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  nav .wrap{ display:flex; align-items:center; justify-content:space-between; padding:14px 28px; }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand img{ height:40px; width:auto; display:block; }
  .brand .wordmark{ font-size:1.2rem; font-weight:600; color:var(--ink); }
  .brand .wordmark .plus{ color:var(--blue-bright); }

  .auth-shell{
    max-width:420px; margin:64px auto; padding:0 28px;
  }
  .auth-card{
    background:linear-gradient(180deg, var(--panel), rgba(8,21,39,0.6));
    border:1px solid var(--line); border-radius:12px; padding:36px;
  }
  .auth-card h1{ font-size:1.5rem; margin-bottom:6px; }
  .auth-card .sub{ color:var(--ink-dim); font-size:0.9rem; margin-bottom:26px; }

  .tabs{ display:flex; gap:6px; margin-bottom:24px; background:var(--bg-soft); border-radius:8px; padding:4px; }
  .tab{
    flex:1; text-align:center; padding:9px; border-radius:6px; font-size:0.88rem; cursor:pointer;
    color:var(--ink-dim); transition:all 0.15s ease;
  }
  .tab.active{ background:var(--panel); color:var(--ink); }

  form{ display:flex; flex-direction:column; gap:16px; }
  form.hidden{ display:none; }
  label{ font-size:0.83rem; color:var(--ink-dim); margin-bottom:5px; display:block; }
  input{
    width:100%; background:var(--bg-soft); border:1px solid var(--line); border-radius:6px;
    padding:11px 13px; color:var(--ink); font-family:'IBM Plex Sans', sans-serif; font-size:0.94rem;
  }
  input:focus{ outline:none; border-color:var(--blue-bright); }

  .btn{
    display:inline-block; padding:12px 24px; border-radius:6px; font-size:0.92rem; font-weight:500;
    border:none; cursor:pointer; transition:all 0.18s ease; width:100%; text-align:center;
    background:linear-gradient(135deg, var(--blue), var(--blue-bright)); color:#00121F;
  }
  .btn:hover{ filter:brightness(1.1); }
  .btn:disabled{ opacity:0.6; cursor:not-allowed; }

  .msg{ font-size:0.85rem; padding:10px 12px; border-radius:6px; margin-top:6px; display:none; }
  .msg.show{ display:block; }
  .msg.error{ background:rgba(255,107,107,0.12); color:var(--danger); border:1px solid rgba(255,107,107,0.3); }
  .msg.success{ background:rgba(79,190,141,0.12); color:var(--success); border:1px solid rgba(79,190,141,0.3); }

  .account-view{ text-align:center; }
  .account-view .email{ color:var(--blue-bright); font-family:'IBM Plex Mono', monospace; font-size:0.9rem; margin:14px 0 24px; word-break:break-all; }

  .setup-note{
    max-width:420px; margin:0 auto 24px; padding:14px 18px; border-radius:8px;
    background:rgba(255,193,7,0.08); border:1px solid rgba(255,193,7,0.25); color:#E8C468; font-size:0.82rem;
  }
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <div class="brand">
      <a href="index.html" style="display:flex; align-items:center; gap:12px;">
        <img src="assets/logo-mark.png" alt="Orchid A+ logo">
        <div class="wordmark">Orchid <span class="plus">A+</span></div>
      </a>
    </div>
  </div>
</nav>

<div class="auth-shell">

  <div id="setupNote" class="setup-note" style="display:none;">
    ⚠ Supabase not configured yet — replace SUPABASE_URL and SUPABASE_ANON_KEY in this page's script with your real project values.
  </div>

  <div class="auth-card">

    <div id="loggedOutView">
      <h1>Welcome</h1>
      <p class="sub">Sign in or create an account to continue.</p>

      <div class="tabs">
        <div class="tab active" id="tabSignIn">Sign In</div>
        <div class="tab" id="tabSignUp">Sign Up</div>
      </div>

      <form id="signInForm">
        <div>
          <label for="siEmail">Email</label>
          <input type="email" id="siEmail" required>
        </div>
        <div>
          <label for="siPassword">Password</label>
          <input type="password" id="siPassword" required>
        </div>
        <button type="submit" class="btn" id="siBtn">Sign In</button>
        <div class="msg" id="siMsg"></div>
      </form>

      <form id="signUpForm" class="hidden">
        <div>
          <label for="suEmail">Email</label>
          <input type="email" id="suEmail" required>
        </div>
        <div>
          <label for="suPassword">Password</label>
          <input type="password" id="suPassword" required minlength="6">
        </div>
        <button type="submit" class="btn" id="suBtn">Create Account</button>
        <div class="msg" id="suMsg"></div>
      </form>
    </div>

    <div id="loggedInView" class="account-view" style="display:none;">
      <h1>You're signed in</h1>
      <div class="email mono" id="userEmail"></div>
      <button class="btn" id="signOutBtn">Sign Out</button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // ===== YOUR REAL SUPABASE PROJECT DETAILS =====
  const SUPABASE_URL = "https://yjjfxllkofkuazajyxcv.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_AvSoPT0Hcl1xTgwTIiRSdw_phmOUAul";
  // ================================================

  const configured = SUPABASE_URL !== "YOUR_SUPABASE_URL" && SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY";
  if (!configured) {
    document.getElementById('setupNote').style.display = 'block';
  }

  const supabaseClient = configured ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

  const tabSignIn = document.getElementById('tabSignIn');
  const tabSignUp = document.getElementById('tabSignUp');
  const signInForm = document.getElementById('signInForm');
  const signUpForm = document.getElementById('signUpForm');

  tabSignIn.addEventListener('click', () => {
    tabSignIn.classList.add('active'); tabSignUp.classList.remove('active');
    signInForm.classList.remove('hidden'); signUpForm.classList.add('hidden');
  });
  tabSignUp.addEventListener('click', () => {
    tabSignUp.classList.add('active'); tabSignIn.classList.remove('active');
    signUpForm.classList.remove('hidden'); signInForm.classList.add('hidden');
  });

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = 'msg show ' + type;
  }

  async function refreshAuthView() {
    if (!configured) return;
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      document.getElementById('loggedOutView').style.display = 'none';
      document.getElementById('loggedInView').style.display = 'block';
      document.getElementById('userEmail').textContent = session.user.email;
    } else {
      document.getElementById('loggedOutView').style.display = 'block';
      document.getElementById('loggedInView').style.display = 'none';
    }
  }

  document.getElementById('signInForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!configured) return;
    const email = document.getElementById('siEmail').value;
    const password = document.getElementById('siPassword').value;
    const btn = document.getElementById('siBtn');
    btn.disabled = true;
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    btn.disabled = false;
    const msg = document.getElementById('siMsg');
    if (error) {
      showMsg(msg, error.message, 'error');
    } else {
      showMsg(msg, 'Signed in! Redirecting…', 'success');
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    }
  });

  document.getElementById('signUpForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!configured) return;
    const email = document.getElementById('suEmail').value;
    const password = document.getElementById('suPassword').value;
    const btn = document.getElementById('suBtn');
    btn.disabled = true;
    const { error } = await supabaseClient.auth.signUp({ email, password });
    btn.disabled = false;
    const msg = document.getElementById('suMsg');
    if (error) {
      showMsg(msg, error.message, 'error');
    } else {
      showMsg(msg, 'Account created! Check your email to confirm, then sign in.', 'success');
    }
  });

  document.getElementById('signOutBtn').addEventListener('click', async () => {
    if (!configured) return;
    await supabaseClient.auth.signOut();
    refreshAuthView();
  });

  if (configured) refreshAuthView();
</script>

</body>
</html>
